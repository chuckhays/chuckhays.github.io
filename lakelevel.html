<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USGS Chart with Historical Comparisons</title>
    
    <link rel="stylesheet" href="https://dashboard.waterdata.usgs.gov/api/gwis/2.1.1/gwis.min.css"/>
    <script src="https://dashboard.waterdata.usgs.gov/api/gwis/2.1.1/gwis.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f6f7;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            margin-top: 0;
            color: #1a5276;
            border-bottom: 2px solid #ebeeef;
            padding-bottom: 10px;
        }
        #usgsChart {
            width: 100%;
            height: 480px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>USGS 05289000 MISSISSIPPI RIVER AT ANOKA, MN</h2>
    <p>Live 30-day gage height plotted against the historic median value and last year's recorded data.</p>

    <div id="usgsChart"></div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        gwis.plot({
            div: 'usgsChart',
            period: 'P30D', // Restricts the view bounds to a 30-day window
            dygraphOptions: {
                title: 'Gage Height Comparison',
                ylabel: 'Gage height, feet',
                labelsUTC: false,
                connectSeparatedPoints: true
            },
            series: {
                // Series 1: Live, real-time continuous data
                'Current Live Data': {
                    siteNumber: '05289000',
                    parameterCode: '00065', 
                    dataType: 'iv' // iv = Instantaneous Values
                },
                // Series 2: Daily mean values for last year 
                // Note: GWIS automatically calculates shifts if it maps to historical frames
                'Last Year Data': {
                    siteNumber: '05289000',
                    parameterCode: '00065',
                    dataType: 'dv', // dv = Daily Values
                    dvStatisticCode: '00003' // 00003 = Mean daily value
                },
                // Series 3: Long term historical day-of-year median
                'Historical Median': {
                    siteNumber: '05289000',
                    parameterCode: '00065',
                    dataType: 'dv',
                    dvStatisticCode: '00002' // 00002 = Median daily value
                }
            }
        });
    });
</script>

</body>
</html>
